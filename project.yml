name: ShinreiSpot
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 13.4.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 83VGKGSQUH

targets:
  ShinreiSpot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ShinreiSpot
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_NAME: ShinreiSpot
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.shinreispot
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: ShinreiSpot/Resources/Info.plist
    info:
      path: ShinreiSpot/Resources/Info.plist
      properties:
        CFBundleDisplayName: "心霊レーダー"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        LSApplicationCategoryType: public.app-category.entertainment
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        GADApplicationIdentifier: "ca-app-pub-9404799280370656~8489838456"
        NSLocationWhenInUseUsageDescription: "近くの心霊スポットを表示するために位置情報を使用します。"
        NSUserTrackingUsageDescription: "広告の最適化のため、トラッキングの許可をお願いします。"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    scheme:
      testTargets: []
